name: server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/server.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'shared/**'
      - '.github/workflows/server.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      # `server/` consumes `@tca-timer/shared` via a `file:../shared`
      # link. The shared package imports `zod` at runtime, so its own
      # `node_modules` must be populated before the server's lint runs;
      # otherwise tsc resolves through the symlink to the real path
      # `shared/src/api/index.ts` and fails to find `zod`.
      - name: Install shared package
        working-directory: shared
        run: npm ci || npm install
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  deploy:
    # TODO(§14.1): wire Railway deploy (e.g. railway up) when ready. Disabled
    # by default so the workflow is inert until secrets are provisioned.
    if: false
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - run: echo "deploy placeholder"
