name: shared

on:
  push:
    branches: [main]
    paths:
      - 'shared/**'
      - '.github/workflows/shared.yml'
  pull_request:
    paths:
      - 'shared/**'
      - '.github/workflows/shared.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shared
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: shared/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
