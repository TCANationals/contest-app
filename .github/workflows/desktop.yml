name: desktop

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'desktop/**'
      - 'shared/**'
      - '.github/workflows/desktop.yml'
  pull_request:
    paths:
      - 'desktop/**'
      - 'shared/**'
      - '.github/workflows/desktop.yml'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      # `desktop/` consumes `@tca-timer/shared` via a `file:../shared`
      # link, so the shared package's own `node_modules` (vitest +
      # typescript) must be installed before the desktop install
      # runs; otherwise npm's reify of the linked dep fails.
      - name: Install shared package
        working-directory: shared
        run: npm ci || npm install
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build

  rust:
    # Prove the workspace compiles and passes clippy + tests on every
    # supported host: Linux (CI default), macOS (§9 cross-platform
    # support), and Windows (§9.1 primary target for the MSI bundle).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json
      # The pinned toolchain in desktop/rust-toolchain.toml is picked up
      # automatically by rustup; the version-spec passed here just seeds
      # the rustup install so the pinned channel can be resolved on hosts
      # that start with no Rust at all (e.g. macos-latest runners).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # Tauri 2 on Linux pulls in GTK/WebKit system libs; install them so
      # the whole workspace (incl. `tca-timer-desktop`) can be checked in
      # CI, not just the non-Tauri IPC crates. macOS and Windows get the
      # required WebView deps from the OS itself.
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            librsvg2-dev libsoup-3.0-dev
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop
      # `tauri::generate_context!` reads the `frontendDist` path
      # (`../dist`) at compile time, so we must produce the Vite
      # bundle before running any Rust commands that touch the
      # `tca-timer-desktop` crate. The desktop install resolves a
      # `file:../shared` link, so the shared package needs its own
      # `npm install` first.
      - name: Install shared package
        working-directory: shared
        run: npm ci || npm install
      - name: Build frontend bundle for Tauri context
        run: |
          npm ci || npm install
          npm run build
      # `bundle.externalBin: ["binaries/tca-timer-ctl"]` in
      # `tauri.conf.json` makes `tauri-build` (run as part of the
      # `tca-timer-desktop` crate's `[build-dependencies]`) check that
      # the per-target-triple sidecar exists on disk before *any*
      # cargo command on the desktop crate succeeds. Plain
      # `npm run build` is `tsc -b && vite build` and does NOT
      # produce that sidecar — only Tauri's own `beforeBuildCommand`
      # hook does, when running through the Tauri CLI. Run the
      # dedicated `build:ctl` script here so `cargo clippy` /
      # `cargo test` below can proceed on each matrix host.
      - name: Build tca-timer-ctl sidecar for the target triple
        run: npm run build:ctl
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --locked

  tauri-bundle:
    # TODO(§14.1): wire tauri-apps/tauri-action for MSI + .app/.dmg
    # artifacts + Release attachment. Disabled until icons / signing
    # settings / workflow secrets are configured.
    if: false
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - uses: tauri-apps/tauri-action@v0
        with:
          projectPath: desktop
          args: '--verbose'
