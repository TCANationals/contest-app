name: Desktop CI

on:
  push:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"
  pull_request:
    paths:
      - "desktop/**"
      - ".github/workflows/desktop.yml"

jobs:
  build-msi:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Tauri prerequisites
        run: echo "TODO: install Tauri build prerequisites"

      - name: Placeholder Tauri action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          args: --debug
