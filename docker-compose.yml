# Local development stack for the TCA Timer.
#
# Brings up three services:
#
#   * `db`     — Postgres 16 with the schema applied via a one-shot
#                migration job on first boot. Persists into the named
#                volume `tca_timer_pgdata`.
#   * `server` — Fastify + ws backend (`server/`) running `npm run dev`
#                under tsx watch. Mounts the source tree read-write so
#                edits on the host hot-reload inside the container.
#                Listens on host port 3000.
#   * `spa`    — Vite dev server for the judge SPA (`spa/`). Listens on
#                host port 5173 with `--host` so a phone on the same
#                LAN can reach it (PWA install testing). Mounts the
#                source tree.
#
# Common usage:
#
#   docker compose up           # start everything (Ctrl+C to stop)
#   docker compose up -d        # start in the background
#   docker compose logs -f server
#   docker compose exec server npm test
#   docker compose down         # stop, keep the db volume
#   docker compose down -v      # also drop the postgres volume (full reset)
#
# The compose file is intentionally dev-only — it uses bind mounts,
# `npm run dev` watchers, and a permissive Postgres password. For
# production we ship the server via Railway (see `server/railway.json`)
# and the SPA via static hosting; this file is not used there.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tca_timer
      POSTGRES_PASSWORD: tca_timer_dev
      POSTGRES_DB: tca_timer
    ports:
      # Exposed so a host-side `psql`, DataGrip, or `npm run migrate`
      # can talk to it directly without docker exec. Bound to 127.0.0.1
      # so it isn't reachable from the LAN by default.
      - "127.0.0.1:5432:5432"
    volumes:
      - tca_timer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tca_timer -d tca_timer"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # One-shot service: applies the SQL files in `server/src/db/migrations/`
  # against the freshly-booted Postgres, then exits 0. Compose's
  # `depends_on: condition: service_completed_successfully` lets the
  # `server` service wait for this before starting, so the very first
  # `docker compose up` does not race the schema vs. the application.
  migrate:
    build:
      # Build context is the repo root so `file:../shared` resolves at
      # `npm ci` time. See `server/Dockerfile.dev` for the rationale.
      context: .
      dockerfile: server/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://tca_timer:tca_timer_dev@db:5432/tca_timer
    command: ["npm", "run", "migrate"]
    volumes:
      - ./server:/app:rw
      - ./shared:/shared:rw
      - server_node_modules:/app/node_modules
      # Same trick as `/app/node_modules`: the bind mount above would
      # otherwise hide `/shared/node_modules` (populated inside the
      # image by `npm ci` in `shared/Dockerfile.dev`-style steps), and
      # without it the shared package's own deps (zod) are unreachable.
      - shared_node_modules:/shared/node_modules
    restart: "no"

  # One-shot service: idempotently inserts a single well-known room
  # (`id=dev`, `roomToken=dev-room-token`) so the desktop overlay can
  # connect immediately on a fresh `docker compose up` without manual
  # admin-API setup. The script hard-refuses to run when
  # `NODE_ENV=production`. See `server/src/db/seed-dev.ts` for the
  # full plain-text contract — it is intentionally non-secret and
  # documented in the repo `README.md`.
  seed-dev:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://tca_timer:tca_timer_dev@db:5432/tca_timer
      NODE_ENV: development
    command: ["npm", "run", "seed:dev"]
    volumes:
      - ./server:/app:rw
      - ./shared:/shared:rw
      - server_node_modules:/app/node_modules
      - shared_node_modules:/shared/node_modules
    restart: "no"

  server:
    build:
      # Build context is the repo root so the image can pull in both
      # `server/` and the `shared/` workspace that the server depends
      # on via `file:../shared` in its package.json.
      context: .
      dockerfile: server/Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      seed-dev:
        condition: service_completed_successfully
    environment:
      PORT: "3000"
      DATABASE_URL: postgres://tca_timer:tca_timer_dev@db:5432/tca_timer
      # Local dev: run without an OIDC provider in front of the server.
      # The `DEV_AUTH_BYPASS` flag (handled in
      # `server/src/auth/identity.ts`) makes every `/api/judge/*`,
      # `/api/admin/*`, and `/api/auth/login` request resolve to a
      # synthetic admin identity so the SPA is usable end to end with
      # no IdP round-trip. The flag is hard-disabled when
      # NODE_ENV=production. To exercise the real OIDC path locally,
      # unset DEV_AUTH_BYPASS and populate OIDC_* + SESSION_SECRET
      # (via a repo-root `.env` or `docker compose run --rm -e ...`).
      DEV_AUTH_BYPASS: "1"
      OIDC_ISSUER: ""
      OIDC_CLIENT_ID: ""
      OIDC_CLIENT_SECRET: ""
      OIDC_REDIRECT_URI: ""
      SESSION_SECRET: ""
      PUBLIC_ORIGIN: "http://localhost:5173"
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app:rw
      # Mirror what the SPA does: the server's
      # `node_modules/@tca-timer/shared` is a symlink that resolves to
      # `/shared` inside the container, so bind-mount the host's
      # `shared/` source tree there to get tsx-watch reloads when
      # shared-package files change.
      - ./shared:/shared:rw
      # Anonymous volume on top of /app/node_modules so the bind-mount
      # above doesn't clobber the linux-x64 node_modules built inside
      # the container with whatever the host (potentially macOS or
      # Windows) has installed locally.
      - server_node_modules:/app/node_modules
      # Same trick for the shared package: the `./shared:/shared` bind
      # mount above would otherwise mask the `/shared/node_modules`
      # that the Dockerfile populates via `npm ci`, leaving the
      # shared package's own deps (zod) unreachable on hosts that
      # don't run `npm install` inside `shared/` themselves.
      - shared_node_modules:/shared/node_modules
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 30s

  spa:
    build:
      # Build context is the repo root so the image can pull in both
      # `spa/` and the `shared/` workspace that the SPA depends on via
      # `file:../shared` in its package.json.
      context: .
      dockerfile: spa/Dockerfile.dev
    depends_on:
      server:
        condition: service_started
    environment:
      # Vite reads this at dev-server boot to set up the dev-time proxy
      # (see `spa/vite.config.ts`). The SPA itself uses relative URLs
      # for both REST and WebSocket calls, matching how it's served
      # behind Cloudflare in prod, and Vite forwards `/api`, `/judge`,
      # and `/contestant` to the Fastify backend at this target. From
      # inside the compose network the server is reachable as
      # `http://server:3000`; override for other setups.
      VITE_API_PROXY: "http://server:3000"
    ports:
      - "5173:5173"
    volumes:
      - ./spa:/app:rw
      # The SPA's `node_modules/@tca-timer/shared` is a symlink that
      # resolves to `/shared` inside the container, so bind-mount the
      # host's `shared/` source tree there to get HMR on shared-package
      # edits as well.
      - ./shared:/shared:rw
      - spa_node_modules:/app/node_modules
      # See the matching mount on `server` for rationale: keep the
      # image's `/shared/node_modules` (zod et al.) intact under the
      # `./shared` bind mount above.
      - shared_node_modules:/shared/node_modules

volumes:
  tca_timer_pgdata:
  server_node_modules:
  spa_node_modules:
  # Holds the linux-x64 install of `shared/`'s own runtime deps so the
  # `./shared:/shared` bind mount used by every consumer service
  # doesn't shadow them with the host-side (possibly empty / macOS /
  # Windows) `shared/node_modules` directory.
  shared_node_modules:
