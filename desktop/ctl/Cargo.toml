[package]
name = "tca_timer_ctl"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "tca-timer-ctl"
path = "src/main.rs"

[dependencies]
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde_json = "1"

[profile.release]
strip = true
lto = true
