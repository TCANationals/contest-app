<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TCA Timer</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; connect-src ipc: http://ipc.localhost wss://*.tcanationals.com wss://tcanationals.com ws://127.0.0.1:* ws://localhost:*; img-src 'self' data: asset: https://asset.localhost; media-src 'self' asset: https://asset.localhost; style-src 'self' 'unsafe-inline'; font-src 'self' data:"
    />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
      }
      /* macOS ("Show scroll bars: Always") and some Windows WebView2
         configurations reserve space for a scrollbar even when the document
         cannot scroll. Collapse it to zero so the overlay remains visually
         clean. */
      ::-webkit-scrollbar {
        width: 0;
        height: 0;
        background: transparent;
      }
    </style>
  </head>
  <body style="background: transparent; margin: 0; overflow: hidden;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
